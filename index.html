<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defence Color Vision Test</title>
    <style>
        /* Basic reset and styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        }

        .hidden {
            display: none !important;
        }

        /* Image styling for the Ishihara plates */
        .plate-img {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px auto;
            border: 3px solid #eee;
            display: block;
        }

        /* Lantern Test UI */
        .lantern-machine {
            background: #222;
            padding: 30px;
            border-radius: 8px;
            width: 120px;
            margin: 20px auto;
            border: 5px solid #000;
        }

        .light {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 15px auto;
            background: #111;
            transition: background 0.1s, box-shadow 0.1s;
        }

        /* Buttons */
        .btn-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            background: #0056b3;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #004494;
        }

        /* Results */
        .result-box {
            padding: 15px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
        }
        
        .pass-cp1 { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .pass-cp2 { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .fail-cp3 { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Medical Board: Color Vision</h1>

        <!-- Phase 1: Ishihara -->
        <div id="ishihara-test">
            <h3 id="ishihara-title">Phase 1: Ishihara Test (Plate 1)</h3>
            <p>What number do you see in the circle?</p>
            
            <!-- We use an actual image tag here instead of math/canvas -->
            <img id="plate-image" class="plate-img" src="" alt="Ishihara Plate">
            
            <div class="btn-container" id="ishihara-buttons"></div>
        </div>

        <!-- Phase 2: Lantern -->
        <div id="lantern-test" class="hidden">
            <h3 id="lantern-title">Phase 2: Lantern Test</h3>
            <p id="lantern-text" style="color: red; font-weight: bold;">Watch the lights closely...</p>
            
            <div class="lantern-machine">
                <div id="top-light" class="light"></div>
                <div id="bottom-light" class="light"></div>
            </div>
            
            <div class="btn-container" id="lantern-buttons"></div>
        </div>

        <!-- Results -->
        <div id="results" class="hidden">
            <h2>Final Assessment</h2>
            <div id="result-verdict" class="result-box"></div>
            <p id="result-desc"></p>
            <button onclick="location.reload()">Take Test Again</button>
        </div>
    </div>

    <script>
        // Data structure for the test using actual Wikipedia Commons image URLs
        const platesData = [
            { 
                imgUrl: "https://upload.wikimedia.org/wikipedia/commons/b/b1/Ishihara_1.png", 
                correct: 12, 
                choices: [12, 17, 21, 8] 
            },
            { 
                imgUrl: "https://upload.wikimedia.org/wikipedia/commons/1/10/Ishihara_11.png", 
                correct: 6, 
                choices: [6, 8, 3, 9] 
            },
            { 
                imgUrl: "https://upload.wikimedia.org/wikipedia/commons/6/6d/Ishihara_23.png", 
                correct: 42, 
                choices: [42, 29, 70, 26] 
            }
        ];

        const lanternData = [
            { top: 'Red', bottom: 'Green', hexTop: '#ff0000', hexBot: '#00ff00' },
            { top: 'White', bottom: 'White', hexTop: '#ffffff', hexBot: '#ffffff' },
            { top: 'Green', bottom: 'Red', hexTop: '#00ff00', hexBot: '#ff0000' }
        ];

        // State variables
        let currentPlateIndex = 0;
        let ishiharaScore = 0;
        
        let currentLanternIndex = 0;
        let lanternScore = 0;
        let lanternTimer;

        // DOM Elements
        const ishiharaSection = document.getElementById('ishihara-test');
        const lanternSection = document.getElementById('lantern-test');
        const resultsSection = document.getElementById('results');

        // --- ISHIHARA LOGIC ---
        function loadNextPlate() {
            if (currentPlateIndex >= platesData.length) {
                // If perfect score, skip lantern. Otherwise, run lantern.
                if (ishiharaScore === platesData.length) {
                    showFinalResult("CP1");
                } else {
                    startLanternTest();
                }
                return;
            }

            const plate = platesData[currentPlateIndex];
            document.getElementById('ishihara-title').innerText = `Phase 1: Ishihara Test (Plate ${currentPlateIndex + 1} of ${platesData.length})`;
            
            // Set the image URL
            document.getElementById('plate-image').src = plate.imgUrl;

            // Render buttons
            const btnDiv = document.getElementById('ishihara-buttons');
            btnDiv.innerHTML = '';
            
            plate.choices.forEach(num => {
                const btn = document.createElement('button');
                btn.innerText = num;
                btn.onclick = () => {
                    if (num === plate.correct) ishiharaScore++;
                    currentPlateIndex++;
                    loadNextPlate();
                };
                btnDiv.appendChild(btn);
            });
        }

        // --- LANTERN LOGIC ---
        function startLanternTest() {
            ishiharaSection.classList.add('hidden');
            lanternSection.classList.remove('hidden');
            loadNextLantern();
        }

        function loadNextLantern() {
            if (currentLanternIndex >= lanternData.length) {
                if (lanternScore === lanternData.length) {
                    showFinalResult("CP2");
                } else {
                    showFinalResult("CP3");
                }
                return;
            }

            const round = lanternData[currentLanternIndex];
            const topLight = document.getElementById('top-light');
            const botLight = document.getElementById('bottom-light');
            const btnDiv = document.getElementById('lantern-buttons');
            const infoText = document.getElementById('lantern-text');

            document.getElementById('lantern-title').innerText = `Phase 2: Lantern (Round ${currentLanternIndex + 1} of ${lanternData.length})`;
            
            // Reset UI for the new round
            btnDiv.innerHTML = ''; 
            infoText.innerText = "Lights will appear for 1.2 seconds...";
            topLight.style.background = '#111';
            botLight.style.background = '#111';

            // Show lights after a short delay
            setTimeout(() => {
                topLight.style.background = round.hexTop;
                botLight.style.background = round.hexBot;

                // Turn them off after 1.2 seconds (Standard military test time)
                clearTimeout(lanternTimer);
                lanternTimer = setTimeout(() => {
                    topLight.style.background = '#111';
                    botLight.style.background = '#111';
                    infoText.innerText = "Select what you saw (Top / Bottom):";
                    showLanternOptions(round);
                }, 1200);

            }, 1000);
        }

        function showLanternOptions(round) {
            const btnDiv = document.getElementById('lantern-buttons');
            const correctString = `${round.top} / ${round.bottom}`;
            
            // Hardcoded options for simplicity
            const options = ["Red / Green", "Green / Red", "White / White", "Red / White", correctString];
            
            // Remove duplicates and render
            const uniqueOptions = [...new Set(options)];
            
            uniqueOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => {
                    if (opt === correctString) lanternScore++;
                    currentLanternIndex++;
                    loadNextLantern();
                };
                btnDiv.appendChild(btn);
            });
        }

        // --- RESULTS LOGIC ---
        function showFinalResult(grade) {
            ishiharaSection.classList.add('hidden');
            lanternSection.classList.add('hidden');
            resultsSection.classList.remove('hidden');

            const verdict = document.getElementById('result-verdict');
            const desc = document.getElementById('result-desc');

            if (grade === "CP1") {
                verdict.innerText = "GRADE: CP-I";
                verdict.className = "result-box pass-cp1";
                desc.innerText = "Pass. Fit for Flying Branch.";
            } else if (grade === "CP2") {
                verdict.innerText = "GRADE: CP-II";
                verdict.className = "result-box pass-cp2";
                desc.innerText = "Pass. Fit for Army/Ground Duty.";
            } else {
                verdict.innerText = "GRADE: CP-III";
                verdict.className = "result-box fail-cp3";
                desc.innerText = "Fail. Unfit for most combat branches.";
            }
        }

        // Start the app
        loadNextPlate();
    </script>
</body>
</html>
